name: Build and Deploy to Github Pages
on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "github-pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm i

      - name: Compile TS
        run: pnpm run -r build

      - name: Run tests
        run: pnpm vitest --run

      - name: Prepare output
        env:
          GAME_PATH: "./workspaces/examples/squares_and_circles"
        run: |
          echo "Copying files to output"
          mkdir -p public
          
          cp -r $GAME_PATH/resources public/
          cp $GAME_PATH/index.html public/
          cp $GAME_PATH/main.css public/
          cp $GAME_PATH/index.js public/

          echo "Public output"
          ls -R public

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./public"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
